title: IIS or Node.js Web Process Spawning CMD or PowerShell
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: Windows variant detecting IIS worker process (w3wp.exe) or Node.js spawning
  cmd.exe or powershell.exe — indicator of successful web application exploitation
  on Windows-hosted Next.js or IIS environments.
author: Manar_Mamdouh_Inovasys
date: 2026-06-01
tags:
  - attack.execution
  - attack.t1059.003
  - attack.t1059.001
  - attack.t1190
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\w3wp.exe'
      - '\iisexpress.exe'
      - '\node.exe'
      - '\python.exe'
      - '\php.exe'
  selection_child:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\pwsh.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  selection_suspicious_cmdline:
    CommandLine|contains:
      - 'whoami'
      - 'net user'
      - 'net localgroup'
      - 'ipconfig'
      - 'systeminfo'
      - 'nltest'
      - 'curl '
      - 'Invoke-WebRequest'
      - 'IEX'
      - 'DownloadString'
      - 'EncodedCommand'
      - '-enc '
      - '-e '
      - 'FromBase64String'
  filter_iis_legit:
    CommandLine|contains:
      - 'iisreset'
      - 'appcmd'
  condition: selection_parent and selection_child and
    selection_suspicious_cmdline and not filter_iis_legit
falsepositives:
  - Legitimate administrative scripts triggered via web interfaces
  - Monitoring agents running under IIS context
level: high
